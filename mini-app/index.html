<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#faf8f5">
  <title>СТЕФАНИЯ — Ресторан</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="https://max.ru/js/max-web-app.js"></script>
</head>
<body>

  <div class="sketch-bg" id="sketch-bg"></div>

  <div id="app">

    <!-- Splash -->
    <div id="splash-screen" class="splash-screen">
      <div class="splash-content">
        <div class="splash-orbit" id="splash-orbit"></div>
        <p class="splash-subtitle">загружаем меню...</p>
      </div>
    </div>

    <!-- Header -->
    <header id="header" class="header hidden">
      <div class="header-inner">
        <button id="back-btn" class="back-btn hidden" aria-label="Назад">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <img class="header-logo-img" src="logo.png" alt="Стефания">
        <h1 class="header-title">СТЕФАНИЯ</h1>
        <button id="cart-btn" class="cart-btn" aria-label="Корзина">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span id="cart-count" class="cart-count hidden">0</span>
        </button>
      </div>
    </header>

    <!-- Home Screen -->
    <main id="home-screen" class="screen hidden">
      <section class="hero">
        <img class="hero-logo-img" src="logo.png" alt="Стефания">
        <h1 class="hero-title">СТЕФАНИЯ</h1>
        <p class="hero-tagline">вкус, объединяющий поколения</p>
        <p class="hero-address">г. Краснодар, Кубанская наб., 186/1</p>
        <a href="tel:+79883535735" class="hero-phone">+7 (988) 353-57-35</a>
        <p class="hero-hours">ежедневно 11:30 – 01:00</p>
        <div class="hero-divider"></div>
      </section>

      <section class="actions">
        <button class="action-card" id="btn-menu">
          <div class="action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Меню и заказ</h3>
            <p>Итальянская и кавказская кухня</p>
          </div>
          <svg class="action-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <button class="action-card" id="btn-reserve">
          <div class="action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Забронировать стол</h3>
            <p>Веранда, VIP и банкетный зал</p>
          </div>
          <svg class="action-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <button class="action-card" id="btn-waiter">
          <div class="action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Вызвать официанта</h3>
            <p>Пригласим к вашему столику</p>
          </div>
          <svg class="action-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </section>
    </main>

    <!-- Menu Screen -->
    <section id="menu-screen" class="screen hidden">
      <div id="categories-bar" class="categories-bar"></div>
      <div id="menu-list" class="menu-list"></div>
    </section>

    <!-- Cart Screen -->
    <section id="cart-screen" class="screen hidden">
      <div class="cart-header-section">
        <h2 class="cart-title">Ваш заказ</h2>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div id="cart-empty" class="cart-empty hidden">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#c4b69a" stroke-width="1" opacity="0.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <p>Корзина пуста</p>
        <button class="btn-back-to-menu" id="btn-back-to-menu">Перейти в меню</button>
      </div>
      <div id="cart-footer" class="cart-footer hidden">
        <div class="cart-order-fields">
          <div class="cart-field-row">
            <label class="cart-field-label" for="order-table">Номер стола</label>
            <input type="number" id="order-table" class="cart-field-input" placeholder="Например: 5" inputmode="numeric" min="1" max="99">
          </div>
          <div class="cart-field-row">
            <label class="cart-field-label" for="order-wishes">Пожелания</label>
            <input type="text" id="order-wishes" class="cart-field-input" placeholder="Аллергии, без лука, и т.д.">
          </div>
        </div>
        <div class="cart-total">
          <span>Итого</span>
          <span id="cart-total-price">0 ₽</span>
        </div>
        <button class="btn-order" id="btn-order">Оформить заказ</button>
      </div>
    </section>

    <!-- Waiter Screen -->
    <section id="waiter-screen" class="screen hidden">
      <div class="form-screen">
        <div class="form-header">
          <h2 class="form-title">Вызов официанта</h2>
          <p class="form-desc">Укажите номер стола и причину</p>
        </div>

        <div class="form-body">
          <label class="form-label">Номер стола</label>
          <input type="number" id="w-table" class="form-input" placeholder="Например: 5" inputmode="numeric" min="1" max="99">

          <label class="form-label">Что нужно?</label>
          <div class="quick-actions" id="w-actions">
            <button class="quick-btn" data-value="Принести счёт">📋 Счёт</button>
            <button class="quick-btn" data-value="Принести меню">📖 Меню</button>
            <button class="quick-btn" data-value="Принять заказ">🍽️ Заказ</button>
            <button class="quick-btn" data-value="Убрать со стола">🧹 Убрать</button>
            <button class="quick-btn" data-value="Принести воду">💧 Вода</button>
            <button class="quick-btn" data-value="Вопрос по блюду">❓ Вопрос</button>
          </div>

          <label class="form-label">Комментарий</label>
          <textarea id="w-comment" class="form-textarea" placeholder="Дополнительные пожелания..." rows="3"></textarea>
        </div>

        <div class="form-footer">
          <button class="btn-form-submit" id="btn-waiter-send">Вызвать официанта</button>
        </div>
      </div>
    </section>

    <!-- Reserve Screen -->
    <section id="reserve-screen" class="screen hidden">
      <div class="form-screen">
        <div class="form-header">
          <h2 class="form-title">Бронирование стола</h2>
          <p class="form-desc">Заполните форму и мы подтвердим бронь</p>
        </div>

        <div class="form-body">
          <label class="form-label">Имя и фамилия</label>
          <input type="text" id="r-name" class="form-input" placeholder="Иван Иванов">

          <label class="form-label">Телефон</label>
          <input type="tel" id="r-phone" class="form-input" placeholder="+7 (___) ___-__-__" inputmode="tel">

          <div class="form-row">
            <div class="form-col">
              <label class="form-label">Дата</label>
              <input type="date" id="r-date" class="form-input">
            </div>
            <div class="form-col">
              <label class="form-label">Время</label>
              <input type="time" id="r-time" class="form-input" value="19:00">
            </div>
          </div>

          <div class="form-row">
            <div class="form-col">
              <label class="form-label">Гостей</label>
              <input type="number" id="r-guests" class="form-input" placeholder="2" min="1" max="50" inputmode="numeric">
            </div>
            <div class="form-col">
              <label class="form-label">Зал</label>
              <select id="r-zone" class="form-select">
                <option value="">Любой</option>
                <option value="Основной зал">Основной зал</option>
                <option value="Веранда 1">Веранда 1</option>
                <option value="Веранда 2">Веранда 2</option>
                <option value="Веранда 3">Веранда 3</option>
                <option value="VIP зал">VIP зал</option>
                <option value="Банкетный зал">Банкетный зал</option>
                <option value="Караоке-зал">Караоке-зал</option>
              </select>
            </div>
          </div>

          <label class="form-label">Комментарий</label>
          <textarea id="r-comment" class="form-textarea" placeholder="Повод, пожелания, аллергии..." rows="3"></textarea>
        </div>

        <div class="form-footer">
          <button class="btn-form-submit" id="btn-reserve-send">Забронировать</button>
        </div>
      </div>
    </section>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
