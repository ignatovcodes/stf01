<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>СТЕФАНИЯ — Меню</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="https://max.ru/js/max-web-app.js"></script>
</head>
<body>

  <div id="app">
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
      <div class="splash-content">
        <div class="splash-logo">С</div>
        <h1 class="splash-title">СТЕФАНИЯ</h1>
        <p class="splash-subtitle">г. Краснодар, Кубанская наб., 186/1</p>
        <div class="splash-loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <header id="header" class="header hidden">
      <div class="header-inner">
        <div class="header-logo">С</div>
        <h1 class="header-title">СТЕФАНИЯ</h1>
        <button id="cart-btn" class="cart-btn" aria-label="Корзина">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span id="cart-count" class="cart-count hidden">0</span>
        </button>
      </div>
    </header>

    <!-- Home Screen -->
    <main id="home-screen" class="screen hidden">
      <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
          <div class="hero-logo">С</div>
          <h1 class="hero-title">СТЕФАНИЯ</h1>
          <p class="hero-address">г. Краснодар, Кубанская наб., 186/1</p>
          <a href="tel:+79883535735" class="hero-phone">+7 (988) 353-57-35</a>
        </div>
      </section>

      <section class="actions">
        <button class="action-card" id="btn-menu">
          <div class="action-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Меню и заказ</h3>
            <p>Просмотр меню и оформление заказа</p>
          </div>
          <svg class="action-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

        <button class="action-card" id="btn-reserve">
          <div class="action-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Забронировать стол</h3>
            <p>Резервация столика на удобное время</p>
          </div>
          <svg class="action-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

        <button class="action-card" id="btn-waiter">
          <div class="action-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </div>
          <div class="action-text">
            <h3>Вызвать официанта</h3>
            <p>Попросить помощь официанта</p>
          </div>
          <svg class="action-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </section>
    </main>

    <!-- Menu Screen -->
    <section id="menu-screen" class="screen hidden">
      <div id="categories-bar" class="categories-bar"></div>
      <div id="menu-list" class="menu-list"></div>
    </section>

    <!-- Cart Screen -->
    <section id="cart-screen" class="screen hidden">
      <div class="cart-header-section">
        <h2 class="cart-title">Ваш заказ</h2>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div id="cart-empty" class="cart-empty hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <p>Корзина пуста</p>
        <button class="btn-back-to-menu" id="btn-back-to-menu">Перейти в меню</button>
      </div>
      <div id="cart-footer" class="cart-footer hidden">
        <div class="cart-total">
          <span>Итого:</span>
          <span id="cart-total-price">0 ₽</span>
        </div>
        <button class="btn-order" id="btn-order">Оформить заказ</button>
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
